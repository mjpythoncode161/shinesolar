services:
  - type: web
    name: shinesolar
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn shinesolar.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
